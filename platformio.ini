; ===========================================================================
; PlatformIO project configuration for "davisreport"
; ---------------------------------------------------------------------------
; PlatformIO is the build system. It downloads the right compiler for the
; ESP32, downloads the libraries listed below, compiles our code, and uploads
; the finished program ("firmware") to the LilyGO board over USB.
;
; If you have never used PlatformIO before, see docs/02-flashing.md for a
; step-by-step walkthrough. The short version:
;     pip install platformio        # install it once
;     pio run --target upload       # compile and flash the board
;     pio device monitor            # watch the board's debug messages
; ===========================================================================

[env:lilygo-t3]
; --- What kind of board are we building for? ---------------------------------
; The LilyGO T3 v1.6.1 is an ESP32 board. We use the generic "esp32dev"
; profile and then tell the code exactly which pins to use in src/config.h.
; (We avoid a board-specific profile because different LilyGO revisions wire
; the radio to slightly different pins, and being explicit avoids surprises.)
; We pin to a specific, well-tested platform release (rather than "latest") so
; that everyone who builds this gets the same compiler and ESP32 core, and so
; builds don't break when a newer, less-stable release comes out.
platform  = espressif32 @ 6.9.0
board     = esp32dev
framework = arduino

; --- Serial / USB settings ---------------------------------------------------
monitor_speed  = 115200      ; debug-message speed; must match Serial.begin() in code
upload_speed   = 921600      ; how fast we push firmware over USB (drop to 460800 if uploads fail)

; --- Which USB port is THIS board on? ---------------------------------------
; By default PlatformIO auto-detects a board, which can grab the WRONG one if
; you have several boards plugged in at once. To pin THIS project to a single
; port, fill in the two lines below and remove the leading ";" to enable them.
;
; HOW TO FIND THE PORT:
;     .venv/bin/pio device list          # shows ports + hardware IDs
;     ls /dev/serial/by-id/              # stable names that don't move around
;
; PREFER the "by-id" path: it's tied to this exact board's USB chip, so it
; won't accidentally point at a different board after an unplug/replug. The
; plain /dev/ttyUSB0 style also works but can change as boards come and go.
;
; upload_port  = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_XXXX-if00-port0
; monitor_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_XXXX-if00-port0

; --- Libraries this project depends on --------------------------------------
; PlatformIO downloads these automatically the first time you build.
lib_deps =
    jgromes/RadioLib @ ^7.0.0          ; talks to the SX1276 radio chip
    olikraus/U8g2 @ ^2.35.30           ; draws text on the little OLED screen
    knolleary/PubSubClient @ ^2.8      ; sends our readings to the MQTT broker
    bblanchon/ArduinoJson @ ^7.0.0     ; builds the JSON messages for Home Assistant

; --- Compiler options --------------------------------------------------------
build_flags =
    -D CORE_DEBUG_LEVEL=0              ; keep the ESP32's internal logging quiet
